name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CHROME_BIN: ${{ github.workspace }}/.chrome/chrome-linux64/chrome
      CHROME_FOR_TESTING_VERSION: 151.0.7922.34
      CHROME_NO_SANDBOX: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Testing
        run: |
          mkdir -p .chrome
          curl --fail --location --retry 3 --silent --show-error \
            --output /tmp/chrome-for-testing.zip \
            "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_FOR_TESTING_VERSION}/linux64/chrome-linux64.zip"
          unzip -q /tmp/chrome-for-testing.zip -d .chrome
          "$CHROME_BIN" --version

      - name: Verify vendored parser assets
        run: |
          npm run vendor:parser
          git diff --exit-code -- vendor/

      - name: Run project checks
        run: npm run check

      - name: Verify package versions match
        run: |
          node -e "const fs = require('node:fs'); const manifest = JSON.parse(fs.readFileSync('manifest.json')); const packageJson = JSON.parse(fs.readFileSync('package.json')); if (manifest.version !== packageJson.version) { console.error('manifest.json and package.json versions must match'); process.exit(1); }"

      - name: Build and verify extension archive
        run: |
          npm run package
          version="$(node -p "JSON.parse(require('node:fs').readFileSync('manifest.json')).version")"
          unzip -t "dist/golens-for-gitlab-v${version}.zip"
