version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      development-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
